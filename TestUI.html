        window.google = {
          script: {
            run: {
              withSuccessHandler: function (fn) {
                this.success = fn;
                return this;
              },
              withFailureHandler: function (fn) {
                this.failure = fn;
                return this;
              },
              testMessage: function (msg) {
                setTimeout(() => {
                  if (this.success)
                    this.success({
                      success: true,
                      replies: [`[Mock] ${msg}`],
                      logs: [`[Mock Log] ${msg}`],
                    });
                }, 500);
              },
              clearTestSession: function () {
                setTimeout(() => {
                  if (this.success) this.success({ success: true });
                }, 500);

                setTimeout(() => {
                  if (this.success) this.success(["Mock1", "Mock2"]);
                }, 300);
              },
              saveCloudHistory: function () {
                // Mock save, do nothing
              },
            },
          },
        };
      })();

      // --- 初始化 ---
      window.onload = function () {
        if (window.isMockMode)
          document.getElementById("mock-badge").style.display = "inline-block";

        // 1. 從後端載入歷史紀錄
        loadCloudHistory();

        // 2. 僅清除測試快取；不可執行正式 LINE 指令。
        google.script.run.clearTestSession("TEST_DEV_001", TEST_UI_ACCESS_TOKEN);
      };

      // --- 雲端歷史系統 ---
      function loadCloudHistory() {
        // 顯示載入中...
        document.getElementById("history-list").innerHTML =
          '<div style="color:#888;font-size:12px;">載入雲端紀錄中...</div>';

        google.script.run
          .withSuccessHandler(function (data) {
            if (data && data.length > 0) {
              historyData = data;
            } else {
              historyData = [...defaultCmds];
            }
            renderHistory();
          })
          .withFailureHandler(function (err) {
            console.error("無法載入歷史:", err);
            historyData = [...defaultCmds]; // 失敗則用預設值
            renderHistory();
          })
          .getCloudHistory(TEST_UI_ACCESS_TOKEN);
      }

      function saveCloudHistory() {
        // 為了效能，不要每次打字都存，前端先更新 UI
        // 後端非同步儲存
        google.script.run.saveCloudHistory(historyData, TEST_UI_ACCESS_TOKEN);
        renderHistory();
      }

      function addToHistory(text) {
        // 避免重複，移到最前
        historyData = historyData.filter((item) => item !== text);
        historyData.unshift(text);
        if (historyData.length > 30) historyData.pop();

        renderHistory();
        saveCloudHistory(); // 觸發雲端儲存
      }

      function clearHistory() {
        if (!confirm("清除所有雲端歷史紀錄？")) return;
        historyData = [...defaultCmds];
        renderHistory();
        saveCloudHistory();
      }

      function renderHistory() {
        var container = document.getElementById("history-list");
        container.innerHTML = "";
        historyData.forEach((text) => {
          var chip = document.createElement("div");
          chip.className = "history-chip";
          chip.innerText = text;
          chip.onclick = function () {
            chip.classList.add("active");
            setTimeout(() => chip.classList.remove("active"), 200);
            addToQueue(text);
          };
          container.appendChild(chip);
        });
      }

      function loadBulkTest() {
        // Update Max Count UI
        document.getElementById("max-q").innerText = PRESET_QUESTIONS.length;
        document.getElementById("start-idx-input").value = "1";
        document.getElementById("input-modal").style.display = "flex";
      }

      function closeInputModal() {
        document.getElementById("input-modal").style.display = "none";
      }

      function confirmBulkTest() {
        var input = document.getElementById("start-idx-input").value;
        var idx = parseInt(input);
        
        if (isNaN(idx) || idx < 1 || idx > PRESET_QUESTIONS.length) {
          alert("請輸入有效的數字 (1-" + PRESET_QUESTIONS.length + ")");
          return;
        }
        
        closeInputModal(); // Close modal first

        if(!confirm("確定要從第 " + idx + " 題開始，載入 " + (PRESET_QUESTIONS.length - idx + 1) + " 題嗎？\n(將花費費用)")) return;
        
        // Add sliced questions to queue
        var questions = PRESET_QUESTIONS.slice(idx - 1);
        questions.forEach(q => {
          messageQueue.push(q);
        });
        
        renderQueue();
        if (!isBotProcessing) processQueue();
      }

      function stopQueue() {
        if(messageQueue.length === 0) return;
        if(!confirm("確定要暫停並清空剩餘的 " + messageQueue.length + " 題排程嗎？")) return;
        messageQueue = [];
        renderQueue();
        // Note: The CURRENTLY processing message will still finish/reply.
      }

      // --- 訊息發送 ---
      function sendMessage() {
        var input = document.getElementById("msg-input");
        var text = input.value.trim();
        if (!text) return;
        addToQueue(text);
        addToHistory(text); // 存入歷史
        currentQuickReplies = []; // 清除舊快速回覆
        input.value = "";
      }

      function addToQueue(text) {
        if (!text) return;
        messageQueue.push(text);
        renderQueue();
        processQueue();
      }

      function processQueue() {
    if (isBotProcessing || messageQueue.length === 0) return;
    var nextMsg = messageQueue[0]; // Peek first, remove only if processed/skipped
    
    // Check cost first
    checkAndSend(nextMsg);
  }
  
  // --- Cost Guard Logic ---
  var costCheckTimer = null;
  
  function checkAndSend(text) {
    isBotProcessing = true; // Lock queue
    
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result.isHighCost) {
           // Safe to send
           messageQueue.shift(); // Remove from queue
           renderQueue();
           doSendMessage(text);
        } else {
           // High Cost -> Show Guard
           showCostModal(text, result.reason);
        }
      })
      .withFailureHandler(function(e) {
         console.error("Cost Check Failed", e);
         // Fallback: Proceed anyway or Skip? Proceed for now.
         messageQueue.shift();
         renderQueue();
         doSendMessage(text); 
      })
      .checkPdfCost(text, TEST_UI_ACCESS_TOKEN);
  }

  function showCostModal(text, reason) {
    var modal = document.getElementById("cost-modal");
    var msg = document.getElementById("modal-msg");
    var timer = document.getElementById("modal-countdown");
    
    msg.innerText = text.substring(0, 50) + (text.length>50?"...":"");
    timer.innerText = "5";
    modal.style.display = "flex";
    
    var count = 5;
    costCheckTimer = setInterval(() => {
      count--;
      timer.innerText = count;
      if (count <= 0) {
        resolveCostCheck(false); // Auto Skip
      }
    }, 1000);
  }

  function resolveCostCheck(isAgree) {
    clearInterval(costCheckTimer);
    document.getElementById("cost-modal").style.display = "none";
    
    var currentMsg = messageQueue.shift(); // Remove pending msg
    renderQueue();
    
    if (isAgree) {
      doSendMessage(currentMsg);
    } else {
      updateLogs([`[Cost Guard] 🚫 自動跳過 ($$$): "${currentMsg}"`]);
      // Trigger next immediately
      isBotProcessing = false;
      setTimeout(processQueue, 500);
    }
  }
      function renderQueue() {
        var bar = document.getElementById("queue-bar");
        var list = document.getElementById("queue-list");
        if (messageQueue.length === 0) {
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        list.innerHTML = messageQueue
          .map((t, i) => `<div class="queue-chip">${i + 1}. ${t}</div>`)
          .join("");
      }

      function doSendMessage(text) {
        isBotProcessing = true;
        addMsg("user", text);

        // 🔥 先寫入一條「準備發送」的日誌
        var logBoxId = Math.random().toString(36).substr(2, 9);
        updateLogs([
          `[${new Date().toLocaleTimeString()}] [HTML] 發送: "${text}"`,
        ]);

        var loadingId = addMsg("bot", "Reading...");

        try {
          google.script.run
            .withSuccessHandler(function (res) {
              isBotProcessing = false;
              removeMsg(loadingId);
              if (res.logs && res.logs.length > 0) updateLogs(res.logs);

              if (res.replies && res.replies.length > 0) {
                res.replies.forEach((reply, idx) => {
                  setTimeout(() => {
                    addMsg("bot", reply);
                  }, idx * 300);
                });
              } else {
                addMsg("bot", "(無回覆)");
              }
              setTimeout(processQueue, 1000);
            })
            .withFailureHandler(function (err) {
              isBotProcessing = false;
              removeMsg(loadingId);
              addMsg("bot", "❌ Error: " + err);
              setTimeout(processQueue, 1000);
            })
            .testMessage(text, "TEST_DEV_001", TEST_UI_ACCESS_TOKEN);
        } catch (e) {
          console.error(e);
          isBotProcessing = false;
        }
      }

      // --- 快速回覆解析 ---
      function extractQuickReplies(msgText) {
        // 檢查是否包含型號選擇標記 (如 「請選擇型號」或「1️⃣ S27...」)
        var quickReplies = [];

        // 模式 1: 數字 emoji 標記的選項 (如 1️⃣ 2️⃣ 3️⃣)
        var emojiPattern = /^([1-9]️⃣|[\d])[\s\.]*(.+)$/gm;
        var match;
        while ((match = emojiPattern.exec(msgText)) !== null) {
          var label = match[2].trim();
          if (label.length > 0 && label.length < 50) {
            quickReplies.push(label);
          }
        }

        // 模式 2: 以「1. 2. 3.」開頭的選項
        if (quickReplies.length === 0) {
          var numPattern = /^(\d+)\.\s*(.+)$/gm;
          while ((match = numPattern.exec(msgText)) !== null) {
            var label = match[2].trim();
            if (label.length > 0 && label.length < 50) {
              quickReplies.push(label);
            }
          }
        }

        // 只有在有多個選項才返回快速回覆
        return quickReplies.length > 1 ? quickReplies : [];
      }

      // --- UI ---
      function addMsg(role, text) {
        var chatBox = document.getElementById("chat-box");
        var id = "msg-" + new Date().getTime();
        var html = `<div class="msg-row ${role}" id="${id}">
      ${role === "bot" ? '<div class="avatar"></div>' : ""}
      <div class="msg-bubble">${text}</div>
    </div>`;
        chatBox.insertAdjacentHTML("beforeend", html);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
      }

      function addMsgWithQuickReplies(role, text, quickReplies) {
        var chatBox = document.getElementById("chat-box");
        var id = "msg-" + new Date().getTime();
        var html = `<div class="msg-row ${role}" id="${id}">
      ${role === "bot" ? '<div class="avatar"></div>' : ""}
      <div>
        <div class="msg-bubble">${text}</div>
        ${
          quickReplies.length > 0
            ? '<div class="quick-reply-group">' +
              quickReplies
                .map(
                  (label) =>
                    `<button class="quick-reply-btn" onclick="sendMessage_Direct('${label.replace(/'/g, "\\'")}')">${label}</button>`,
                )
                .join("") +
              "</div>"
            : ""
        }
      </div>
    </div>`;
        chatBox.insertAdjacentHTML("beforeend", html);
        chatBox.scrollTop = chatBox.scrollHeight;
        return id;
      }

      function sendMessage_Direct(text) {
        var chatBox = document.getElementById("chat-box");
        addMsg("user", text);
        addToHistory(text);
        currentQuickReplies = [];

        // 🔥 先寫入一條「準備發送」的日誌
        updateLogs([
          `[${new Date().toLocaleTimeString()}] [HTML] 發送 (快速回覆): "${text}"`,
        ]);

        var loadingId = addMsg("bot", "Reading...");

        isBotProcessing = true;
        google.script.run
          .withSuccessHandler(function (res) {
            isBotProcessing = false;
            removeMsg(loadingId);
            if (res.logs && res.logs.length > 0) updateLogs(res.logs);

            if (res.replies && res.replies.length > 0) {
              res.replies.forEach((reply, idx) => {
                setTimeout(() => {
                  addMsg("bot", reply);
                }, idx * 300);
              });
            } else {
              addMsg("bot", "(無回覆)");
            }
            setTimeout(processQueue, 1000);
          })
          .withFailureHandler(function (err) {
            isBotProcessing = false;
            removeMsg(loadingId);
            addMsg("bot", "❌ Error: " + err);
            setTimeout(processQueue, 1000);
          })
          .testMessage(text, "TEST_DEV_001", TEST_UI_ACCESS_TOKEN);
      }

      function removeMsg(id) {
        var el = document.getElementById(id);
        if (el) el.remove();
      }

      function updateLogs(logs) {
        var logBox = document.getElementById("log-box");
        logs.forEach((line) => {
          // 確保完整顯示長文字，不截斷
          var logText = typeof line === 'string' ? line : String(line);
          var logDiv = document.createElement('div');
          logDiv.className = 'log-line';
          logDiv.title = logText; // 保存原始完整文字
          
          // 根據詳細模式決定顯示內容
          if (isDetailMode) {
            logDiv.innerHTML = logText;
          } else {
            // 簡潔模式：截斷長文字
            logDiv.innerHTML = logText.length > 80 ? logText.substring(0, 80) + '...' : logText;
          }
          
          // 點擊展開/收合功能
          logDiv.onclick = function() {
            this.classList.toggle('expanded');
            if (this.classList.contains('expanded')) {
              this.innerHTML = this.title; // 顯示完整文字
              this.style.whiteSpace = 'pre-wrap';
              this.style.wordBreak = 'break-all';
            } else {
              // 恢復原來的顯示模式
              if (isDetailMode) {
                this.innerHTML = this.title;
              } else {
                this.innerHTML = this.title.length > 80 ? this.title.substring(0, 80) + '...' : this.title;
              }
            }
          };
          
          logBox.appendChild(logDiv);
        });
        logBox.scrollTop = logBox.scrollHeight;
      }

      function clearSession() {
        if (!confirm("重置模擬器？")) return;
        document.getElementById("chat-box").innerHTML = "";
        document.getElementById("log-box").innerHTML = "";
        messageQueue = [];
        currentQuickReplies = [];
        renderQueue();
        isBotProcessing = false;
        google.script.run.clearTestSession("TEST_DEV_001", TEST_UI_ACCESS_TOKEN);
      }

      function copyLogs() {
        navigator.clipboard.writeText(
          document.getElementById("log-box").innerText,
        );
        alert("Copied");
      }
      function clearLogUI() {
        document.getElementById("log-box").innerHTML = "";
      }
      function checkEnter(e) {
        if (e.key === "Enter") sendMessage();
      }

      // 詳細模式控制
      var isDetailMode = true; // 預設開啟詳細模式
      function toggleDetailMode() {
        isDetailMode = !isDetailMode;
        var btn = document.getElementById('detail-btn');
        var logBox = document.getElementById('log-box');
        
        if (isDetailMode) {
          btn.innerHTML = '📝 詳細';
          btn.style.background = '#0066cc';
          btn.style.color = 'white';
          logBox.style.fontSize = '12px';
        } else {
          btn.innerHTML = '📋 簡潔';
          btn.style.background = '#666';
          btn.style.color = '#ccc';
          logBox.style.fontSize = '11px';
        }
        
        // 重新渲染現有日誌
        var allLogs = Array.from(logBox.children);
        allLogs.forEach(log => {
          if (!isDetailMode) {
            // 簡潔模式：截斷長文字
            var text = log.textContent;
            if (text.length > 80) {
              log.innerHTML = text.substring(0, 80) + '...';
            }
          } else {
            // 詳細模式：顯示完整文字
            var originalText = log.title || log.textContent;
            log.innerHTML = originalText;
          }
        });
      }
    </script>
  </body>
</html>
